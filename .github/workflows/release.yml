name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: macos-14
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_sha256: ${{ steps.sha.outputs.zip_sha256 }}
      dmg_sha256: ${{ steps.sha.outputs.dmg_sha256 }}
      zip_artifact_name: ${{ steps.names.outputs.zip_artifact_name }}
      dmg_artifact_name: ${{ steps.names.outputs.dmg_artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify MARKETING_VERSION matches tag
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_FILE="CaffBar.xcodeproj/project.pbxproj"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PROJECT_VERSION="$(grep -m1 'MARKETING_VERSION = ' "$PROJECT_FILE" | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/' | tr -d '[:space:]')"
          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match MARKETING_VERSION ($PROJECT_VERSION)" >&2
            exit 1
          fi

      - name: Build release packages
        shell: bash
        run: ./scripts/package.sh

      - name: Prepare artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "zip_artifact_name=CaffBar-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "dmg_artifact_name=CaffBar-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Optional app signing / notarization placeholder
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Signing/notarization placeholder: insert certificate import, app codesign, DMG-aware notarization, and stapling steps here."
          echo "This workflow intentionally skips signing by default when secrets are not configured."

      - name: Compute SHA-256 values
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="dist/CaffBar-${VERSION}.zip"
          DMG_FILE="dist/CaffBar-${VERSION}.dmg"
          ZIP_SHA="$(shasum -a 256 "$ZIP_FILE" | awk '{print $1}')"
          DMG_SHA="$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')"
          echo "zip_sha256=$ZIP_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_sha256=$DMG_SHA" >> "$GITHUB_OUTPUT"
          echo "ZIP SHA-256: $ZIP_SHA"
          echo "DMG SHA-256: $DMG_SHA"

      - name: Upload ZIP build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caffbar-release-zip
          path: dist/CaffBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Upload DMG build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caffbar-release-dmg
          path: dist/CaffBar-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CaffBar-${{ steps.version.outputs.version }}.zip
            dist/CaffBar-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          body: |
            ZIP SHA-256: `${{ steps.sha.outputs.zip_sha256 }}`
            DMG SHA-256: `${{ steps.sha.outputs.dmg_sha256 }}`

  update-homebrew-tap:
    name: Update Homebrew tap cask
    runs-on: ubuntu-latest
    needs: build-release
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Skip gracefully if tap token is missing
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        shell: bash
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured."
          echo "Release artifact was published, but tap repo was not updated."
          echo "Set HOMEBREW_TAP_TOKEN with repo write access to akalp/homebrew-caffbar to enable automatic cask updates."
          exit 0

      - name: Clone tap repo
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/akalp/homebrew-caffbar.git" tap-repo

      - name: Update cask version, sha, and URL
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          CASK_FILE="tap-repo/Casks/caffbar.rb"
          VERSION="${{ needs.build-release.outputs.version }}"
          SHA="${{ needs.build-release.outputs.zip_sha256 }}"
          ruby -e '
            path = ARGV[0]
            version = ARGV[1]
            sha = ARGV[2]
            content = File.read(path)
            content = content.sub(/version\s+"[^"]+"/, "version \"#{version}\"")
            content = content.sub(/sha256\s+"[0-9a-f]{64}"/, "sha256 \"#{sha}\"")
            content = content.sub(%r{url\s+\"https://github\.com/akalp/caffbar/releases/download/v[^\"]+/CaffBar-[^\"]+\.zip\"}, "url \"https://github.com/akalp/caffbar/releases/download/v#{version}/CaffBar-#{version}.zip\"")
            File.write(path, content)
          ' "$CASK_FILE" "$VERSION" "$SHA"

      - name: Commit and push tap update
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/caffbar.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update caffbar cask to v${{ needs.build-release.outputs.version }}"
          git push origin HEAD
