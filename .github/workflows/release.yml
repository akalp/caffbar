name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      artifact_name: ${{ steps.names.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify MARKETING_VERSION matches tag
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_FILE="CaffBar.xcodeproj/project.pbxproj"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PROJECT_VERSION="$(grep -m1 'MARKETING_VERSION = ' "$PROJECT_FILE" | sed -E 's/.*MARKETING_VERSION = ([^;]+);/\1/' | tr -d '[:space:]')"
          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match MARKETING_VERSION ($PROJECT_VERSION)" >&2
            exit 1
          fi

      - name: Build ZIP package
        shell: bash
        run: ./scripts/package.sh

      - name: Prepare artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "artifact_name=CaffBar-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Optional codesign / notarize placeholder
        if: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Signing/notarization placeholder: insert certificate import, codesign, notarize, and stapling steps here."
          echo "This workflow intentionally skips signing by default when secrets are not configured."

      - name: Compute SHA-256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          FILE="dist/CaffBar-${{ steps.version.outputs.version }}.zip"
          SHA="$(shasum -a 256 "$FILE" | awk '{print $1}')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caffbar-release-zip
          path: dist/CaffBar-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CaffBar-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          body: |
            SHA-256: `${{ steps.sha.outputs.sha256 }}`

  update-homebrew-tap:
    name: Update Homebrew tap cask
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Skip gracefully if tap token is missing
        if: ${{ secrets.HOMEBREW_TAP_TOKEN == '' }}
        shell: bash
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured."
          echo "Release artifact was published, but tap repo was not updated."
          echo "Set HOMEBREW_TAP_TOKEN with repo write access to akalp/homebrew-caffbar to enable automatic cask updates."
          exit 0

      - name: Clone tap repo
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/akalp/homebrew-caffbar.git" tap-repo

      - name: Update cask version, sha, and URL
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          CASK_FILE="tap-repo/Casks/caffbar.rb"
          VERSION="${{ needs.build-release.outputs.version }}"
          SHA="${{ needs.build-release.outputs.sha256 }}"
          ruby -e '
            path = ARGV[0]
            version = ARGV[1]
            sha = ARGV[2]
            content = File.read(path)
            content = content.sub(/version\s+"[^"]+"/, "version \"#{version}\"")
            content = content.sub(/sha256\s+"[0-9a-f]{64}"/, "sha256 \"#{sha}\"")
            content = content.sub(%r{url\s+\"https://github\.com/akalp/caffbar/releases/download/v#\{version\}/CaffBar-#\{version\}\.zip\"}, "url \"https://github.com/akalp/caffbar/releases/download/v#{version}/CaffBar-#{version}.zip\"")
            File.write(path, content)
          ' "$CASK_FILE" "$VERSION" "$SHA"

      - name: Commit and push tap update
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/caffbar.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update caffbar cask to v${{ needs.build-release.outputs.version }}"
          git push origin HEAD
